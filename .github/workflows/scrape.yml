name: ETF Scraper

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      backtest_only:
        description: 'Skip ETF scrape, run only backtest data fetch'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  scrape:
    name: Scrape ETF + backtest data
    runs-on: ubuntu-latest
    timeout-minutes: 350

    defaults:
      run:
        working-directory: ./scraper

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      HEATMAP_OUTPUT_DIR: ${{ github.workspace }}/scraper/heatmap_output
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Supabase secrets are set
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Required secrets VITE_SUPABASE_URL and/or SUPABASE_SERVICE_ROLE_KEY are missing."
            exit 1
          fi
          echo "Secrets present (URL host: $(echo $VITE_SUPABASE_URL | sed 's|https://||;s|/.*||'))"

      - name: ETF scrape (skipped if backtest_only=true)
        if: ${{ github.event.inputs.backtest_only != 'true' }}
        run: python final_scraper.py --csv ISIN.csv --batch-size 50 --resume

      - name: Backtest data (Yahoo Finance indexes)
        if: ${{ always() }}
        run: python final_scraper.py --backtest-only

      - name: Upload run artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: scraper-run-${{ github.run_id }}
          path: |
            scraper/justetf_complete_production/logs/
            scraper/justetf_complete_production/checkpoints/
            scraper/heatmap_output/
          retention-days: 7
          if-no-files-found: ignore
