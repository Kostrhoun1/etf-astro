name: ETF Scraper

# Two parallel jobs each scrape half of ISIN.csv (~3h each), then a backtest
# job runs once after both halves complete. Total wall time: ~3h. Daily.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   VITE_SUPABASE_URL          Supabase project URL
#   SUPABASE_SERVICE_ROLE_KEY  Supabase service role key (full DB access)

on:
  schedule:
    # Daily at 03:00 UTC (= 04:00 CET / 05:00 CEST). JustETF is quietest then.
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      backtest_only:
        description: 'Skip ETF scrape, run only backtest data fetch'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  scrape:
    name: Scrape half ${{ matrix.part }}
    if: ${{ github.event.inputs.backtest_only != 'true' }}
    runs-on: ubuntu-latest
    # Just under GitHub's hard 6h limit. Each half should finish in ~3h, this
    # is a safety ceiling.
    timeout-minutes: 359

    strategy:
      # If half 1 fails, still let half 2 finish — no wasted work.
      fail-fast: false
      matrix:
        part: [1, 2]

    defaults:
      run:
        working-directory: ./scraper

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      HEATMAP_OUTPUT_DIR: ${{ github.workspace }}/scraper/heatmap_output_${{ matrix.part }}
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Supabase secrets are set
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Required secrets VITE_SUPABASE_URL and/or SUPABASE_SERVICE_ROLE_KEY are missing."
            exit 1
          fi
          echo "Secrets present (URL host: $(echo $VITE_SUPABASE_URL | sed 's|https://||;s|/.*||'))"

      - name: Split ISIN.csv into halves and pick this half
        # Splits the input file into two roughly equal halves at runtime.
        # Each parallel matrix job picks its half via ${{ matrix.part }}.
        run: |
          set -euo pipefail
          TOTAL=$(tail -n +2 ISIN.csv | wc -l)
          HALF=$(( (TOTAL + 1) / 2 ))
          echo "Total ISINs: $TOTAL, half size: $HALF"

          # Header
          head -n 1 ISIN.csv > ISIN_split.csv

          if [ "${{ matrix.part }}" = "1" ]; then
            tail -n +2 ISIN.csv | head -n "$HALF" >> ISIN_split.csv
          else
            tail -n +2 ISIN.csv | tail -n +"$((HALF + 1))" >> ISIN_split.csv
          fi

          PART_COUNT=$(tail -n +2 ISIN_split.csv | wc -l)
          echo "::notice::Half ${{ matrix.part }} will process $PART_COUNT ISINs"

      - name: Restore scraper checkpoints (resume support)
        # If yesterday's run timed out partway, restore the checkpoint so today
        # picks up where we left off. Per-half cache key.
        uses: actions/cache/restore@v4
        with:
          path: scraper/justetf_complete_production/checkpoints
          key: scraper-checkpoints-part${{ matrix.part }}-${{ github.run_id }}
          restore-keys: |
            scraper-checkpoints-part${{ matrix.part }}-

      - name: ETF scrape (this half)
        run: python final_scraper.py --csv ISIN_split.csv --batch-size 50 --resume

      - name: Save scraper checkpoints
        # Always save, even on failure/timeout — that's the whole point of
        # caching: next run can resume.
        if: ${{ always() }}
        uses: actions/cache/save@v4
        with:
          path: scraper/justetf_complete_production/checkpoints
          key: scraper-checkpoints-part${{ matrix.part }}-${{ github.run_id }}

      - name: Upload run artifacts (logs + checkpoints)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: scraper-run-${{ github.run_id }}-half${{ matrix.part }}
          path: |
            scraper/justetf_complete_production/logs/
            scraper/justetf_complete_production/checkpoints/
            scraper/heatmap_output_${{ matrix.part }}/
          retention-days: 7
          if-no-files-found: ignore

  backtest:
    name: Backtest data (Yahoo Finance)
    # Runs after both halves complete (or fail) — backtest data is independent
    # of ETF scraping and only needs to run once.
    needs: scrape
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: ./scraper

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      HEATMAP_OUTPUT_DIR: ${{ github.workspace }}/scraper/heatmap_output
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Supabase secrets are set
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Required secrets are missing."
            exit 1
          fi

      - name: Run backtest data fetch
        run: python final_scraper.py --backtest-only

      - name: Upload backtest artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: backtest-run-${{ github.run_id }}
          path: scraper/justetf_complete_production/logs/
          retention-days: 7
          if-no-files-found: ignore

  trigger_rebuild:
    name: Trigger Vercel rebuild
    # Runs after both scrape halves and backtest finish. Only fires the deploy
    # hook if the ETF scrape jobs actually succeeded — no point rebuilding a
    # site that's about to read the same stale data.
    needs: [scrape, backtest]
    if: ${{ needs.scrape.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: POST to Vercel deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "::warning::VERCEL_DEPLOY_HOOK_URL secret is not set — skipping rebuild trigger."
            exit 0
          fi
          # Vercel deploy hook accepts an empty POST and returns 201 with the
          # queued job ID. Curl with -fsS so HTTP errors fail the step.
          response=$(curl -fsS -X POST "$DEPLOY_HOOK_URL")
          echo "Vercel deploy hook response:"
          echo "$response"
          echo "::notice::Vercel rebuild triggered. Site should be live with fresh data in ~20 minutes."
